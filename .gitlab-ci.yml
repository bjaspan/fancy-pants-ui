pages:
  image: alpine:latest
  stage: deploy
  script:
    # 1. Create a temporary directory to avoid infinite recursion
    - mkdir .temp_public
    # 2. Copy everything from root into the temporary directory
    # (Exclude the .git folder and the temporary folder itself)
    - cp -rp * .temp_public/ 2>/dev/null || true
    # 3. Rename it to 'public' (GitLab's mandatory folder name)
    - mv .temp_public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH